services:
  hermes-suite:
    build:
      context: ..
      dockerfile: docker/hermes.Dockerfile
      args:
        AGENT_VERSION: ${HERMES_AGENT_VERSION:-v2026.5.29.2}
        HERMES_WEBUI_VERSION: ${HERMES_WEBUI_VERSION:-v0.51.269}
        OBSIDIAN_HEADLESS_VERSION: ${OBSIDIAN_HEADLESS_VERSION:-0.0.10}
    image: ${HERMES_SUITE_IMAGE:-ghcr.io/gwelican/hermes-suite}:${HERMES_SUITE_IMAGE_TAG:-2026.06.05.1}
    container_name: hermes-suite
    networks:
      agent_net:
        ipv4_address: 10.99.0.11
    ports:
      - "8642:8642" # Gateway
      - "8787:8787" # WebUI
      - "9119:9119" # Dashboard
    volumes:
      - ~/.hermes:/opt/data:Z
      - ~/workspace:/workspace:z
      - /etc/localtime:/etc/localtime:ro
    environment:
      - NODE_ENV=production
      - HERMES_HOME=/opt/data
      - HERMES_DATA_DIR=/opt/data
      - PATH=/opt/hermes/.venv/bin:/opt/hermes-webui/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

networks:
  agent_net:
    external: true
