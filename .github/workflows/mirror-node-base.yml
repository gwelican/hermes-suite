name: Mirror Node Base Image

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

env:
  SOURCE_IMAGE: docker.io/library/node:24-bookworm-slim
  TARGET_IMAGE: ghcr.io/gwelican/node:24-bookworm-slim

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: gwelican
          password: ${{ secrets.GH_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Mirror image to GHCR
        run: |
          set -e
          docker buildx imagetools create \
            --tag "${TARGET_IMAGE}" \
            "${SOURCE_IMAGE}"
