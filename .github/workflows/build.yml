name: Build and Push Multi-Arch Image

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: gwelican/hermes-suite

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse versions
        id: versions
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Strip leading 'v' for image tag
          DOCKER_TAG="${TAG#v}"
          echo "docker_tag=${DOCKER_TAG}" >> "$GITHUB_OUTPUT"

          # Tag format: {agent}-{webui}-ob{obsidian}
          # e.g. 2026.5.29.2-0.51.230-ob0.0.10
          # Extract agent version (everything before last two hyphens)
          # and webui version (between those hyphens)
          AGENT_VER="${DOCKER_TAG%-*-*}"
          WEBUI_OB="${DOCKER_TAG#${AGENT_VER}-}"
          WEBUI_VER="${WEBUI_OB%-*}"
          OB_VER="${WEBUI_OB##*-ob}"

          echo "agent_version=v${AGENT_VER}" >> "$GITHUB_OUTPUT"
          echo "webui_version=v${WEBUI_VER}" >> "$GITHUB_OUTPUT"
          echo "obsidian_version=${OB_VER}" >> "$GITHUB_OUTPUT"

          echo "Suite tag:     ${DOCKER_TAG}"
          echo "Agent version: v${AGENT_VER}"
          echo "WebUI version: v${WEBUI_VER}"
          echo "Obsidian CLI:  ${OB_VER}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            AGENT_VERSION=${{ steps.versions.outputs.agent_version }}
            HERMES_WEBUI_VERSION=${{ steps.versions.outputs.webui_version }}
            OBSIDIAN_HEADLESS_VERSION=${{ steps.versions.outputs.obsidian_version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.versions.outputs.docker_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
