name: Build and Push Images

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load versions
        id: versions
        run: |
          set -a && . versions.env && set +a
          set -a && . agentmemory/versions.env && set +a

          OBSIDIAN_HEADLESS_VERSION="$(grep -m1 '^ARG OBSIDIAN_HEADLESS_VERSION=' Dockerfile | sed 's/^ARG OBSIDIAN_HEADLESS_VERSION=//')"

          AGENT_CLEAN="${AGENT_VERSION#v}"
          WEBUI_CLEAN="${WEBUI_VERSION#v}"
          HERMES_TAG="${AGENT_CLEAN}-${WEBUI_CLEAN}-ob${OBSIDIAN_HEADLESS_VERSION}"

          echo "agent_version=${AGENT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "webui_version=${WEBUI_VERSION}" >> "$GITHUB_OUTPUT"
          echo "obsidian_version=${OBSIDIAN_HEADLESS_VERSION}" >> "$GITHUB_OUTPUT"
          echo "hermes_tag=${HERMES_TAG}" >> "$GITHUB_OUTPUT"

          echo "agentmemory_version=${AGENTMEMORY_VERSION}" >> "$GITHUB_OUTPUT"
          echo "agentmemory_iii_version=${AGENTMEMORY_III_VERSION}" >> "$GITHUB_OUTPUT"

          echo "Hermes tag:    ${HERMES_TAG}"
          echo "Agent:         ${AGENT_VERSION}"
          echo "WebUI:         ${WEBUI_VERSION}"
          echo "Obsidian:      ${OBSIDIAN_HEADLESS_VERSION}"
          echo "AgentMemory:   ${AGENTMEMORY_VERSION}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Build and push AgentMemory
        uses: docker/build-push-action@v6
        with:
          context: agentmemory
          file: agentmemory/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            AGENTMEMORY_VERSION=${{ steps.versions.outputs.agentmemory_version }}
            AGENTMEMORY_III_VERSION=${{ steps.versions.outputs.agentmemory_iii_version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-agentmemory:${{ steps.versions.outputs.agentmemory_version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-agentmemory:latest
          cache-from: type=gha,scope=agentmemory
          cache-to: type=gha,mode=max,scope=agentmemory

      - name: Build and push Hermes
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            AGENT_VERSION=${{ steps.versions.outputs.agent_version }}
            HERMES_WEBUI_VERSION=${{ steps.versions.outputs.webui_version }}
            OBSIDIAN_HEADLESS_VERSION=${{ steps.versions.outputs.obsidian_version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.versions.outputs.hermes_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha,scope=hermes
          cache-to: type=gha,mode=max,scope=hermes
