# =============================================================================
# .woodpecker/tag.yml — Auto-create release tag on main when versions.env changes
#
# Triggered on: push to main branch
#
# Expects github_token in the agent environment (via WOODPECKER_ENVIRONMENT).
# =============================================================================

when:
  event: push
  branch: main

steps:
  - name: fetch-tags
    image: alpine/git
    commands:
      - git fetch origin --tags

  - name: create-tag
    image: alpine/git
    commands:
      - set -e
      - set -a && . versions.env && set +a
      - |
        OBSIDIAN_HEADLESS_VERSION="$(sed -n 's/^ARG OBSIDIAN_HEADLESS_VERSION=//p; T; q' Dockerfile)"
        AGENT_CLEAN="${AGENT_VERSION#v}"
        WEBUI_CLEAN="${WEBUI_VERSION#v}"
        TAG="v${AGENT_CLEAN}-${WEBUI_CLEAN}-ob${OBSIDIAN_HEADLESS_VERSION}"
        echo "Computed tag: ${TAG}"
        if git rev-parse "${TAG}" >/dev/null 2>&1; then
          echo "Tag ${TAG} already exists. Skipping."
          exit 0
        fi
        git config user.email "ci@woodpecker"
        git config user.name "Woodpecker CI"
        git tag -a "${TAG}" -m "Release ${TAG}  [agent=${AGENT_VERSION}, webui=${WEBUI_VERSION}, obsidian-headless=${OBSIDIAN_HEADLESS_VERSION}]"
        git push "https://x-access-token:${github_token}@github.com/${CI_REPO_OWNER}/${CI_REPO_NAME}.git" "${TAG}"
        echo "Pushed tag ${TAG}"
