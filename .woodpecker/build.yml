# =============================================================================
# .woodpecker/build.yml — Build and push Hermes Suite image via Kaniko
#
# Triggered on: tag push matching refs/tags/v*
#
# Expects github_token in the agent environment (via WOODPECKER_ENVIRONMENT).
# =============================================================================

when:
  event: tag
  ref: refs/tags/v*

steps:
  - name: build-push
    image: gcr.io/kaniko-project/executor:debug
    commands:
      - |
        set -e
        set -a && . versions.env && set +a
        OBSIDIAN_HEADLESS_VERSION="$(grep -m1 '^ARG OBSIDIAN_HEADLESS_VERSION=' Dockerfile | sed 's/^ARG OBSIDIAN_HEADLESS_VERSION=//')"
        mkdir -p /kaniko/.docker
        printf '%s:%s' "${CI_REPO_OWNER}" "${github_token}" | base64 -w0 > /tmp/auth_b64
        AUTH="$(cat /tmp/auth_b64)"
        echo "{\"auths\":{\"ghcr.io\":{\"auth\":\"${AUTH}\"}}}" > /kaniko/.docker/config.json
        rm /tmp/auth_b64
        IMAGE="ghcr.io/${CI_REPO_OWNER}/${CI_REPO_NAME}"
        IMAGE_TAG="${AGENT_VERSION#v}-${WEBUI_VERSION#v}-ob${OBSIDIAN_HEADLESS_VERSION}"
        echo "Building ${IMAGE}:${IMAGE_TAG}"
        /kaniko/executor \
          --context . \
          --dockerfile Dockerfile \
          --destination "${IMAGE}:${IMAGE_TAG}" \
          --destination "${IMAGE}:latest" \
          --build-arg "AGENT_VERSION=${AGENT_VERSION}" \
          --build-arg "HERMES_WEBUI_VERSION=${WEBUI_VERSION}" \
          --build-arg "OBSIDIAN_HEADLESS_VERSION=${OBSIDIAN_HEADLESS_VERSION}"
