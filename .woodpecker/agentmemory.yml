# =============================================================================
# .woodpecker/agentmemory.yml — Build and push AgentMemory image via Kaniko
#
# Triggered on: push to main branch
#
# Expects github_token in the agent environment (via WOODPECKER_ENVIRONMENT).
# =============================================================================

when:
  event: push
  branch: main

steps:
  - name: build-push
    image: gcr.io/kaniko-project/executor:debug
    commands:
      - |
        set -e
        set -a && . agentmemory/versions.env && set +a
        mkdir -p /kaniko/.docker
        printf '%s:%s' "${CI_REPO_OWNER}" "${github_token}" | base64 -w0 > /tmp/auth_b64
        AUTH="$(cat /tmp/auth_b64)"
        echo "{\"auths\":{\"ghcr.io\":{\"auth\":\"${AUTH}\"}}}" > /kaniko/.docker/config.json
        rm /tmp/auth_b64
        /kaniko/executor \
          --context agentmemory \
          --dockerfile Dockerfile \
          --destination "ghcr.io/${CI_REPO_OWNER}/${CI_REPO_NAME}-agentmemory:${AGENTMEMORY_VERSION}" \
          --destination "ghcr.io/${CI_REPO_OWNER}/${CI_REPO_NAME}-agentmemory:latest" \
          --build-arg "AGENTMEMORY_VERSION=${AGENTMEMORY_VERSION}" \
          --build-arg "AGENTMEMORY_III_VERSION=${AGENTMEMORY_III_VERSION}"
