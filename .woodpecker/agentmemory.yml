# =============================================================================
# .woodpecker/agentmemory.yml — Build and push standalone AgentMemory image
#
# Triggered on: push to main branch
#
# Secrets required in Woodpecker UI:
#   github_token — GitHub PAT with write:packages scope
#
# No QEMU, no buildx. Native amd64 build only.
# =============================================================================

when:
  event: push
  branch: main

steps:
  - name: read-versions
    image: alpine
    commands:
      - |
        set -e
        set -a && . agentmemory/versions.env && set +a
        {
          echo "AGENTMEMORY_VERSION=${AGENTMEMORY_VERSION}"
          echo "AGENTMEMORY_III_VERSION=${AGENTMEMORY_III_VERSION}"
          echo "IMAGE=ghcr.io/${CI_REPO_OWNER}/${CI_REPO_NAME}-agentmemory"
        } > .env.agentmemory
        cat .env.agentmemory

  - name: login-ghcr
    image: docker:dind
    privileged: true
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$CI_REPO_OWNER" --password-stdin

  - name: build-push
    image: docker:dind
    privileged: true
    commands:
      - set -e
      - set -a && . .env.agentmemory && set +a
      - |
        docker build \
          -f agentmemory/Dockerfile \
          -t "${IMAGE}:${AGENTMEMORY_VERSION}" \
          -t "${IMAGE}:latest" \
          --build-arg "AGENTMEMORY_VERSION=${AGENTMEMORY_VERSION}" \
          --build-arg "AGENTMEMORY_III_VERSION=${AGENTMEMORY_III_VERSION}" \
          agentmemory
      - docker push "${IMAGE}:${AGENTMEMORY_VERSION}"
      - docker push "${IMAGE}:latest"
