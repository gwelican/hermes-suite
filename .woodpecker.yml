steps:
  - name: create-tag
    image: alpine/git
    when:
      - event: push
        branch: main
    environment:
      github_token:
        from_secret: GH_TOKEN
    commands:
      - git fetch origin --tags
      - |
        set -e
        if [ ! -f versions.env ]; then
          echo "ERROR: versions.env not found in $(pwd)" >&2
          ls -la
          exit 1
        fi
        AGENT_VERSION="$(grep '^AGENT_VERSION=' versions.env | cut -d= -f2-)"
        WEBUI_VERSION="$(grep '^WEBUI_VERSION=' versions.env | cut -d= -f2-)"
        OBSIDIAN_HEADLESS_VERSION="$(grep -m1 '^ARG OBSIDIAN_HEADLESS_VERSION=' Dockerfile | sed 's/^ARG OBSIDIAN_HEADLESS_VERSION=//')"
        echo "AGENT_VERSION=${AGENT_VERSION}"
        echo "WEBUI_VERSION=${WEBUI_VERSION}"
        echo "OBSIDIAN_HEADLESS_VERSION=${OBSIDIAN_HEADLESS_VERSION}"
        if [ -z "${AGENT_VERSION}" ] || [ -z "${WEBUI_VERSION}" ] || [ -z "${OBSIDIAN_HEADLESS_VERSION}" ]; then
          echo "ERROR: One or more version variables are empty" >&2
          exit 1
        fi
        AGENT_CLEAN="${AGENT_VERSION#v}"
        WEBUI_CLEAN="${WEBUI_VERSION#v}"
        TAG="v${AGENT_CLEAN}-${WEBUI_CLEAN}-ob${OBSIDIAN_HEADLESS_VERSION}"
        echo "TAG=${TAG}"
        if git rev-parse "${TAG}" >/dev/null 2>&1; then
          echo "Tag ${TAG} already exists. Skipping."
          exit 0
        fi
        git config user.email "ci@woodpecker"
        git config user.name "Woodpecker CI"
        git tag -a "${TAG}" -m "Release ${TAG}"
        git push "https://x-access-token:${github_token}@github.com/${CI_REPO_OWNER}/${CI_REPO_NAME}.git" "${TAG}"

  - name: build-agentmemory
    image: gcr.io/kaniko-project/executor:latest
    when:
      - event: push
        branch: main
    environment:
      github_token:
        from_secret: GH_TOKEN
    commands:
      - |
        set -e
        AGENTMEMORY_VERSION="$(grep '^AGENTMEMORY_VERSION=' agentmemory/versions.env | cut -d= -f2-)"
        AGENTMEMORY_III_VERSION="$(grep '^AGENTMEMORY_III_VERSION=' agentmemory/versions.env | cut -d= -f2-)"
        /kaniko/executor \
          --dockerfile agentmemory/Dockerfile \
          --context dir://agentmemory \
          --destination "ghcr.io/${CI_REPO_OWNER}/${CI_REPO_NAME}-agentmemory:${AGENTMEMORY_VERSION}" \
          --destination "ghcr.io/${CI_REPO_OWNER}/${CI_REPO_NAME}-agentmemory:latest" \
          --build-arg "AGENTMEMORY_VERSION=${AGENTMEMORY_VERSION}" \
          --build-arg "AGENTMEMORY_III_VERSION=${AGENTMEMORY_III_VERSION}" \
          --cache=true

  - name: build-hermes
    image: gcr.io/kaniko-project/executor:latest
    when:
      - event: tag
    environment:
      github_token:
        from_secret: GH_TOKEN
    commands:
      - |
        set -e
        AGENT_VERSION="$(grep '^AGENT_VERSION=' versions.env | cut -d= -f2-)"
        WEBUI_VERSION="$(grep '^WEBUI_VERSION=' versions.env | cut -d= -f2-)"
        OBSIDIAN_HEADLESS_VERSION="$(grep -m1 '^ARG OBSIDIAN_HEADLESS_VERSION=' Dockerfile | sed 's/^ARG OBSIDIAN_HEADLESS_VERSION=//')"
        IMAGE_TAG="${AGENT_VERSION#v}-${WEBUI_VERSION#v}-ob${OBSIDIAN_HEADLESS_VERSION}"
        /kaniko/executor \
          --dockerfile Dockerfile \
          --context dir://. \
          --destination "ghcr.io/${CI_REPO_OWNER}/${CI_REPO_NAME}:${IMAGE_TAG}" \
          --destination "ghcr.io/${CI_REPO_OWNER}/${CI_REPO_NAME}:latest" \
          --build-arg "AGENT_VERSION=${AGENT_VERSION}" \
          --build-arg "HERMES_WEBUI_VERSION=${WEBUI_VERSION}" \
          --build-arg "OBSIDIAN_HEADLESS_VERSION=${OBSIDIAN_HEADLESS_VERSION}" \
          --cache=true
