steps:
  - name: create-tag
    image: alpine/git
    when:
      - event: push
        branch: main
    environment:
      github_token:
        from_secret: GH_TOKEN
    commands:
      - git fetch origin --tags
      - >
        set -e;
        AGENT_VERSION=$(grep '^AGENT_VERSION=' versions.env | awk -F= '{print $2}')
        OBSIDIAN_HEADLESS_VERSION=$(grep '^OBSIDIAN_HEADLESS_VERSION=' versions.env | awk -F= '{print $2}')
        WEBUI_VERSION=$(grep '^WEBUI_VERSION=' versions.env | awk -F= '{print $2}')

        AGENT_CLEAN="${AGENT_VERSION#v}";
        WEBUI_CLEAN="${WEBUI_VERSION#v}";
        TAG="v${AGENT_CLEAN}-${WEBUI_CLEAN}-ob${OBSIDIAN_HEADLESS_VERSION}";
        echo "TAG=${TAG}";
        git rev-parse "${TAG}" >/dev/null 2>&1 && { echo "Tag ${TAG} already exists. Skipping."; exit 0; };
        git config user.email "ci@woodpecker";
        git config user.name "Woodpecker CI";
        git tag -a "${TAG}" -m "Release ${TAG}";
        git push "https://x-access-token:${github_token}@github.com/${CI_REPO_OWNER}/${CI_REPO_NAME}.git" "${TAG}"

  - name: build-agentmemory
    image: gcr.io/kaniko-project/executor:latest
    when:
      - event: push
        branch: main
    environment:
      github_token:
        from_secret: GH_TOKEN
    commands:
      - >
        set -e;
        . ./agentmemory/versions.env;
        /kaniko/executor
        --dockerfile agentmemory/Dockerfile
        --context dir://agentmemory
        --destination "ghcr.io/${CI_REPO_OWNER}/${CI_REPO_NAME}-agentmemory:${AGENTMEMORY_VERSION}"
        --destination "ghcr.io/${CI_REPO_OWNER}/${CI_REPO_NAME}-agentmemory:latest"
        --build-arg "AGENTMEMORY_VERSION=${AGENTMEMORY_VERSION}"
        --build-arg "AGENTMEMORY_III_VERSION=${AGENTMEMORY_III_VERSION}"
        --cache=true

  - name: build-hermes
    image: gcr.io/kaniko-project/executor:latest
    when:
      - event: tag
    environment:
      github_token:
        from_secret: GH_TOKEN
    commands:
      - >
        set -e;
        . ./versions.env;
        OBSIDIAN_HEADLESS_VERSION="$(sed -n 's/^ARG OBSIDIAN_HEADLESS_VERSION=//p' Dockerfile | head -n1)";
        IMAGE_TAG="${AGENT_VERSION#v}-${WEBUI_VERSION#v}-ob${OBSIDIAN_HEADLESS_VERSION}";
        /kaniko/executor
        --dockerfile Dockerfile
        --context dir://.
        --destination "ghcr.io/${CI_REPO_OWNER}/${CI_REPO_NAME}:${IMAGE_TAG}"
        --destination "ghcr.io/${CI_REPO_OWNER}/${CI_REPO_NAME}:latest"
        --build-arg "AGENT_VERSION=${AGENT_VERSION}"
        --build-arg "HERMES_WEBUI_VERSION=${WEBUI_VERSION}"
        --build-arg "OBSIDIAN_HEADLESS_VERSION=${OBSIDIAN_HEADLESS_VERSION}"
        --cache=true
