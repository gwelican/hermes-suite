steps:
  - name: create-tag
    image: alpine/git
    when:
      - event: push
        branch: main
    environment:
      GH_TOKEN:
        from_secret: GH_TOKEN
    commands:
      - git fetch origin --tags
      - >
        set -e;
        . ./versions.env;
        AGENT_CLEAN="$${AGENT_VERSION#v}";
        WEBUI_CLEAN="$${WEBUI_VERSION#v}";
        OBSIDIAN_HEADLESS_VERSION="$$(sed -n 's/^ARG OBSIDIAN_HEADLESS_VERSION=//p' Dockerfile | head -n1)";
        RELEASE_TAG="v$${AGENT_CLEAN}-$${WEBUI_CLEAN}-ob$${OBSIDIAN_HEADLESS_VERSION}";
        echo "AGENT_VERSION=$${AGENT_VERSION}";
        echo "WEBUI_VERSION=$${WEBUI_VERSION}";
        echo "OBSIDIAN_HEADLESS_VERSION=$${OBSIDIAN_HEADLESS_VERSION}";
        echo "RELEASE_TAG=$${RELEASE_TAG}";
        git rev-parse "$${RELEASE_TAG}" >/dev/null 2>&1 && { echo "Tag $${RELEASE_TAG} already exists. Skipping."; exit 0; };
        git config user.email "ci@woodpecker";
        git config user.name "Woodpecker CI";
        git tag -a "$${RELEASE_TAG}" -m "Release $${RELEASE_TAG}";
        git push "https://x-access-token:$${GH_TOKEN}@github.com/$${CI_REPO_OWNER}/$${CI_REPO_NAME}.git" "$${RELEASE_TAG}"

  - name: build-agentmemory
    image: gcr.io/kaniko-project/executor:debug
    when:
      - event: push
        branch: main
    environment:
      GH_TOKEN:
        from_secret: GH_TOKEN
      GHCR_USERNAME: gwelican
    commands:
      - >
        set -e;
        . ./agentmemory/versions.env;
        mkdir -p /kaniko/.docker;
        AUTH="$$(printf '%s:%s' "$${GHCR_USERNAME}" "$${GH_TOKEN}" | base64 | tr -d '\n')";
        printf '{"auths":{"ghcr.io":{"auth":"%s"}}}' "$${AUTH}" > /kaniko/.docker/config.json;
        /kaniko/executor
        --dockerfile agentmemory/Dockerfile
        --context dir://agentmemory
        --destination "ghcr.io/$${CI_REPO_OWNER}/$${CI_REPO_NAME}:$${AGENTMEMORY_VERSION}"
        --destination "ghcr.io/$${CI_REPO_OWNER}/$${CI_REPO_NAME}:latest"
        --build-arg "AGENTMEMORY_VERSION=$${AGENTMEMORY_VERSION}"
        --build-arg "AGENTMEMORY_III_VERSION=$${AGENTMEMORY_III_VERSION}"
        --cache=true

  - name: build-hermes
    image: gcr.io/kaniko-project/executor:debug
    when:
      - event: tag
    environment:
      GH_TOKEN:
        from_secret: GH_TOKEN
      GHCR_USERNAME: gwelican
    commands:
      - >
        set -e;
        . ./versions.env;
        OBSIDIAN_HEADLESS_VERSION="$$(sed -n 's/^ARG OBSIDIAN_HEADLESS_VERSION=//p' Dockerfile | head -n1)";
        IMAGE_TAG="$${AGENT_VERSION#v}-$${WEBUI_VERSION#v}-ob$${OBSIDIAN_HEADLESS_VERSION}";
        mkdir -p /kaniko/.docker;
        AUTH="$$(printf '%s:%s' "$${GHCR_USERNAME}" "$${GH_TOKEN}" | base64 | tr -d '\n')";
        printf '{"auths":{"ghcr.io":{"auth":"%s"}}}' "$${AUTH}" > /kaniko/.docker/config.json;
        /kaniko/executor
        --dockerfile Dockerfile
        --context dir://.
        --destination "ghcr.io/$${CI_REPO_OWNER}/$${CI_REPO_NAME}:$${IMAGE_TAG}"
        --destination "ghcr.io/$${CI_REPO_OWNER}/$${CI_REPO_NAME}:latest"
        --build-arg "AGENT_VERSION=$${AGENT_VERSION}"
        --build-arg "HERMES_WEBUI_VERSION=$${WEBUI_VERSION}"
        --build-arg "OBSIDIAN_HEADLESS_VERSION=$${OBSIDIAN_HEADLESS_VERSION}"
        --cache=true
