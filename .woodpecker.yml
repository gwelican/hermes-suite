volumes:
  - name: docker-sock
    host:
      path: /var/run/docker.sock

steps:
  - name: create-tag
    image: alpine/git
    when:
      event: push
      branch: main
    commands:
      - git fetch origin --tags
      - |
        set -e
        set -a && . versions.env && set +a
        OBSIDIAN_HEADLESS_VERSION="$(grep -m1 '^ARG OBSIDIAN_HEADLESS_VERSION=' Dockerfile | sed 's/^ARG OBSIDIAN_HEADLESS_VERSION=//')"
        AGENT_CLEAN="${AGENT_VERSION#v}"
        WEBUI_CLEAN="${WEBUI_VERSION#v}"
        TAG="v${AGENT_CLEAN}-${WEBUI_CLEAN}-ob${OBSIDIAN_HEADLESS_VERSION}"
        if git rev-parse "${TAG}" >/dev/null 2>&1; then
          echo "Tag ${TAG} already exists. Skipping."
          exit 0
        fi
        git config user.email "ci@woodpecker"
        git config user.name "Woodpecker CI"
        git tag -a "${TAG}" -m "Release ${TAG}"
        git push "https://x-access-token:${github_token}@github.com/${CI_REPO_OWNER}/${CI_REPO_NAME}.git" "${TAG}"

  - name: build-agentmemory
    image: docker:cli
    when:
      event: push
      branch: main
    volumes:
      - name: docker-sock
        path: /var/run/docker.sock
    commands:
      - |
        set -e
        set -a && . agentmemory/versions.env && set +a
        echo "${github_token}" | docker login ghcr.io -u "${CI_REPO_OWNER}" --password-stdin
        docker build \
          -f agentmemory/Dockerfile \
          -t "ghcr.io/${CI_REPO_OWNER}/${CI_REPO_NAME}-agentmemory:${AGENTMEMORY_VERSION}" \
          -t "ghcr.io/${CI_REPO_OWNER}/${CI_REPO_NAME}-agentmemory:latest" \
          --build-arg "AGENTMEMORY_VERSION=${AGENTMEMORY_VERSION}" \
          --build-arg "AGENTMEMORY_III_VERSION=${AGENTMEMORY_III_VERSION}" \
          agentmemory
        docker push "ghcr.io/${CI_REPO_OWNER}/${CI_REPO_NAME}-agentmemory:${AGENTMEMORY_VERSION}"
        docker push "ghcr.io/${CI_REPO_OWNER}/${CI_REPO_NAME}-agentmemory:latest"

  - name: build-hermes
    image: docker:cli
    when:
      event: tag
    volumes:
      - name: docker-sock
        path: /var/run/docker.sock
    commands:
      - |
        set -e
        set -a && . versions.env && set +a
        OBSIDIAN_HEADLESS_VERSION="$(grep -m1 '^ARG OBSIDIAN_HEADLESS_VERSION=' Dockerfile | sed 's/^ARG OBSIDIAN_HEADLESS_VERSION=//')"
        IMAGE="ghcr.io/${CI_REPO_OWNER}/${CI_REPO_NAME}"
        IMAGE_TAG="${AGENT_VERSION#v}-${WEBUI_VERSION#v}-ob${OBSIDIAN_HEADLESS_VERSION}"
        echo "${github_token}" | docker login ghcr.io -u "${CI_REPO_OWNER}" --password-stdin
        docker build \
          --build-arg "AGENT_VERSION=${AGENT_VERSION}" \
          --build-arg "HERMES_WEBUI_VERSION=${WEBUI_VERSION}" \
          --build-arg "OBSIDIAN_HEADLESS_VERSION=${OBSIDIAN_HEADLESS_VERSION}" \
          -t "${IMAGE}:${IMAGE_TAG}" \
          -t "${IMAGE}:latest" \
          .
        docker push "${IMAGE}:${IMAGE_TAG}"
        docker push "${IMAGE}:latest"
